<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="scss/index.scss">
  <title>Social Media Template</title>
</head>
<body>
  <!-- beginning navbar -->
  <nav class="navbar">
    <!-- beginning left navbar components -->
    <div class="navbar__nav-left">
      <img class="navbar__nav-left__logo" src="img/logo.png" width="160" height="45" alt="Logo">
      <ul>
        <li><img src="img/notification.png" alt="Notification"></li>
        <li><img src="img/inbox.png" alt="Inbox"></li>
        <li><img src="img/video.png" alt="Video"></li>
      </ul>
    </div> <!-- end left navbar components -->

    <!-- beginning right navbar components -->
    <div class="navbar__nav-right">
      <div class="navbar_nav-right__search">
        <img src="img/search.png" alt="Search">
        <input type="text" placeholder="Search...">
      </div>
      <div class="navbar_nav-right__profile active">
        <img src="img/profile-pic.png" alt="Profile picture">
      </div>
    </div> <!-- end right navbar components -->

  </nav> <!-- end navbar -->

  <section class="app-container">

    <!-- beginning left sidebar -->
    <aside class="left-sidebar"></aside> <!-- end left sidebar -->

    <!-- beginning main content -->
    <main class="main-content"></main> <!-- end main content -->

    <!-- beginning right sidebar -->
    <aside class="right-sidebar"></aside> <!-- end right sidebar -->
  </section>
</body>
</html>
