<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="scss/index.scss">
  <title>Social Media Template</title>
</head>
<body>
  <!-- beginning navbar -->
  <nav class="navbar">
    <!-- beginning left navbar components -->
    <div class="navbar__nav-left">
      <img class="navbar__nav-left__logo" src="img/logo.png" width="160" height="45" alt="Logo">
      <ul>
        <li><img src="img/notification.png" alt="Notification"></li>
        <li><img src="img/inbox.png" alt="Inbox"></li>
        <li><img src="img/video.png" alt="Video"></li>
      </ul>
    </div> <!-- end left navbar components -->

    <!-- beginning right navbar components -->
    <div class="navbar__nav-right">
      <div class="navbar_nav-right__search">
        <img src="img/search.png" alt="Search">
        <input type="text" placeholder="Search...">
      </div>
      <div class="navbar_nav-right__profile active">
        <img src="img/profile-pic.png" alt="Profile picture">
      </div>
    </div> <!-- end right navbar components -->

  </nav> <!-- end navbar -->

  <section class="app-container">

    <!-- beginning left sidebar -->
    <aside class="left-sidebar">
      <div class="links">
        <a href="#"><img src="img/news.png" alt="Latest News"> Latest News</a>
        <a href="#"><img src="img/friends.png" alt="Friends"> Friends</a>
        <a href="#"><img src="img/group.png" alt="Group"> Group</a>
        <a href="#"><img src="img/marketplace.png" alt="Marketplace"> Marketplace</a>
        <a href="#"><img src="img/watch.png" alt="Watch video"> Watch</a>
        <a href="#">See more...</a>
      </div>
      <div class="shortcut-links">
        <h1>your shortcuts</h1>
        <a href='#'><img src="img/shortcut-1.png" alt="Web Developers"> Web Developers</a>
        <a href='#'><img src="img/shortcut-2.png" alt="Web Design Course"> Web Design Course</a>
        <a href='#'><img src="img/shortcut-3.png" alt="Full Stack Development">Full Stack Development</a>
        <a href='#'><img src="img/shortcut-4.png" alt="Flutter Developers">Flutter Developers</a>
      </div>
    </aside> <!-- end left sidebar -->

    <!-- beginning main content -->
    <main class="main-content"></main> <!-- end main content -->

    <!-- beginning right sidebar -->
    <aside class="right-sidebar"></aside> <!-- end right sidebar -->
  </section>
</body>
</html>
